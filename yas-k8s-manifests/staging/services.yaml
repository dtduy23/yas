# YAS Staging Environment - Backend Services (13 services)
# Image tag: commit ID (e.g. abc123) - more stable than branch name
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: yas-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product
        image: duyd4010/yas-product:main
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/product
        - name: SPRING_DATASOURCE_USERNAME
          value: admin
        - name: SPRING_DATASOURCE_PASSWORD
          value: admin
        - name: SERVER_PORT
          value: "8080"
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: yas-staging
spec:
  selector:
    app: product
  ports:
  - port: 80
    targetPort: 8080
