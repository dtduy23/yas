# Nginx API Gateway for staging
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: yas-staging
data:
  default.conf: |
    server {
      listen 80;
      server_name api.yas.staging;
      location /product/  { proxy_pass http://product.yas-staging.svc.cluster.local; }
      location /media/    { proxy_pass http://media.yas-staging.svc.cluster.local; }
      location /cart/     { proxy_pass http://cart.yas-staging.svc.cluster.local; }
      location /customer/ { proxy_pass http://customer.yas-staging.svc.cluster.local; }
      location /order/    { proxy_pass http://order.yas-staging.svc.cluster.local; }
      location /payment/  { proxy_pass http://payment.yas-staging.svc.cluster.local; }
      location /tax/      { proxy_pass http://tax.yas-staging.svc.cluster.local; }
    }
    server {
      listen 80;
      server_name identity.yas.staging;
      location / {
        proxy_pass http://identity.yas-staging.svc.cluster.local;
        proxy_set_header Host $host;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: yas-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.2
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: yas-staging
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30081
