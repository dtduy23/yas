apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: yas-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
      - name: zookeeper
        image: debezium/zookeeper:2.7.3.Final
        ports:
        - containerPort: 2181
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi", cpu: "300m" }
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: yas-dev
spec:
  selector:
    app: zookeeper
  ports:
  - port: 2181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: yas-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.7.1
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: zookeeper:2181
        - name: KAFKA_ADVERTISED_LISTENERS
          value: PLAINTEXT://kafka:9092
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        resources:
          requests: { memory: "512Mi", cpu: "200m" }
          limits: { memory: "1Gi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: yas-dev
spec:
  selector:
    app: kafka
  ports:
  - port: 9092
